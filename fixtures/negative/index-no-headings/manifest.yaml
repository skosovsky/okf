description: "index.md list entries before a section heading violate the reserved index structure"
run:
  path: "."
  strict: false
  check_links: false
  check_orphans: false
expected:
  exit_code: 1
  diagnostics:
    - severity: "ERROR"
      message_contains: "index.md list entry appears before any heading"
    - severity: "ERROR"
      message_contains: "index.md should contain at least one heading"
